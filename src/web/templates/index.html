<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kai_system</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <h1 class="logo">kai_system</h1>
                <span class="status-badge" id="statusBadge">待機中</span>
                <span class="sse-indicator" id="sseIndicator" title="リアルタイム接続"></span>
            </div>
            <div class="header-right">
                <button class="btn btn-ghost" onclick="location.href='/help'" title="ヘルプ">?</button>
                <button class="btn btn-ghost" onclick="location.href='/editor'" title="設定エディタ">&#9881;</button>
                <button class="btn btn-ghost" onclick="reloadConfig()" title="設定を再読み込み">&#128260;</button>
            </div>
        </header>

        <!-- 期間指定バー -->
        <section class="period-bar" id="periodBar">
            <div class="period-row">
                <div class="period-field">
                    <label>FROM <span class="tz-hint">JST</span></label>
                    <input type="datetime-local" id="dtFrom" class="date-input">
                </div>
                <span class="period-arrow">&rarr;</span>
                <div class="period-field">
                    <label>TO <span class="tz-hint">JST</span></label>
                    <input type="datetime-local" id="dtTo" class="date-input">
                </div>
            </div>
            <div class="period-actions">
                <div class="quick-btns">
                    <button class="date-quick-btn active" onclick="setPreset('yesterday', this)">昨日分</button>
                    <button class="date-quick-btn" onclick="setPreset('2days', this)">2日前</button>
                    <button class="date-quick-btn" onclick="setPreset('last_week', this)">先週</button>
                    <span class="quick-sep">|</span>
                    <button class="date-quick-btn" onclick="setPreset('day_shift', this)" title="07:00-19:00">&#9728;
                        日勤</button>
                    <button class="date-quick-btn" onclick="setPreset('night_shift', this)" title="19:00-翌07:00">&#127769;
                        夜勤</button>
                    <span class="quick-sep">|</span>
                    <button class="date-quick-btn" onclick="setPreset('thismonth', this)">今月</button>
                    <span class="quick-sep">|</span>
                    <div class="week-input-group">
                        <label class="week-label">W</label>
                        <input type="number" id="weekNumInput" class="week-num-input" min="1" max="53" placeholder="--"
                            title="週番号を入力してEnter">
                        <input type="number" id="weekYearInput" class="week-year-input" min="2020" max="2099" title="年">
                        <button class="date-quick-btn" onclick="applyWeekInput()">&rarr;</button>
                    </div>
                </div>
                <div class="tz-controls">
                    <span class="tz-label">{from} =</span>
                    <div class="tz-toggle" onclick="toggleTzMode()" title="汎用変数 {from}/{to} の解決先を切替">
                        <span class="tz-option active" id="tzJst">JST</span>
                        <span class="tz-option" id="tzUtc">UTC</span>
                        <div class="tz-slider" id="tzSlider"></div>
                    </div>
                </div>
            </div>
            <div class="tz-converted-bar" id="tzConvertedBar"></div>
        </section>

        <main class="main">
            <section class="panel" id="actionPanel">
                <div id="groupContainer">
                    <div class="welcome-guide" id="welcomeGuide">
                        <div class="welcome-icon">&#128640;</div>
                        <h3>まだアクションが登録されていません</h3>
                        <p>設定エディタからアクションを追加して、自動化を始めましょう</p>
                        <button class="btn btn-primary" onclick="location.href='/editor'">&#9881; 設定エディタを開く</button>
                    </div>
                </div>
            </section>

            <section class="panel progress-panel" id="progressPanel" style="display:none;">
                <div class="progress-header">
                    <span class="progress-title" id="progressTitle">実行中...</span>
                    <div class="progress-right">
                        <span class="elapsed-timer" id="elapsedTimer"></span>
                        <button class="btn btn-danger btn-sm" onclick="stopExecution()">&#9209; 中断</button>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <p class="progress-detail" id="progressDetail"></p>
            </section>

            <!-- 完了サマリーカード -->
            <section class="panel completion-card" id="completionCard" style="display:none;">
                <div class="completion-header" id="completionHeader">
                    <span class="completion-icon" id="completionIcon"></span>
                    <span class="completion-title" id="completionTitle"></span>
                    <button class="btn btn-ghost btn-sm" onclick="dismissCompletion()">&#10005;</button>
                </div>
                <div class="completion-body" id="completionBody"></div>
            </section>

            <section class="panel stats-panel" id="statsPanel">
                <div class="panel-header">
                    <h2>&#128202; 統計</h2>
                </div>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <span class="stat-value" id="statTotal">-</span>
                        <span class="stat-label">総実行数</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value stat-success" id="statSuccess">-</span>
                        <span class="stat-label">成功</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value stat-error" id="statFailed">-</span>
                        <span class="stat-label">失敗</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="statRate">-</span>
                        <span class="stat-label">成功率</span>
                    </div>
                </div>
                <div class="daily-chart" id="dailyChart"></div>
                <div class="stats-recent" id="statsRecent"></div>
                <div style="text-align:center;margin-top:8px;">
                    <button class="filter-btn" onclick="toggleLogPanel()" title="ログを表示">&#128221; ログを表示</button>
                </div>
            </section>

            <section class="panel history-panel">
                <div class="panel-header">
                    <h2>&#128203; 履歴</h2>
                    <div class="filter-group">
                        <button class="filter-btn active" onclick="setFilter('all', this)">全て</button>
                        <button class="filter-btn" onclick="setFilter('success', this)">成功</button>
                        <button class="filter-btn" onclick="setFilter('error', this)">失敗</button>
                        <a href="/api/execution-history/export" class="filter-btn" title="CSVエクスポート" style="text-decoration:none">&#128229; CSV</a>
                    </div>
                </div>
                <div class="history-list" id="historyList">
                    <p class="empty-state">まだ履歴はありません</p>
                </div>
            </section>

            <!-- ログパネル -->
            <section class="panel log-panel" id="logPanel" style="display:none;">
                <div class="panel-header">
                    <h2>&#128221; ログ</h2>
                    <div class="filter-group">
                        <select id="logLevel" class="log-filter-select" onchange="fetchLogs()">
                            <option value="">全レベル</option>
                            <option value="INFO">INFO</option>
                            <option value="WARNING">WARNING</option>
                            <option value="ERROR">ERROR</option>
                            <option value="SUCCESS">SUCCESS</option>
                        </select>
                        <input type="text" id="logSearch" class="log-search-input" placeholder="&#128269; 検索..." onkeyup="if(event.key==='Enter')fetchLogs()">
                        <button class="filter-btn" onclick="fetchLogs()">&#128260;</button>
                        <button class="filter-btn" onclick="toggleLogPanel()">&#10005;</button>
                    </div>
                </div>
                <div class="log-list" id="logList">
                    <p class="empty-state">ログを読み込み中...</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <details class="template-info" open>
                <summary>テンプレート変数（展開後の値）</summary>
                <div class="template-vars" id="templateVars"></div>
            </details>
        </footer>

        <!-- トースト通知 -->
        <div id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <!-- 実行確認モーダル -->
    <div class="modal-overlay" id="confirmModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">実行確認</h3>
                <button class="btn btn-ghost" onclick="closeModal()">&#10005;</button>
            </div>
            <div class="modal-body">
                <div class="modal-period">
                    <div class="modal-period-row">
                        <span class="modal-label">From:</span>
                        <span id="modalFrom" class="modal-value"></span>
                    </div>
                    <div class="modal-period-row">
                        <span class="modal-label">To:</span>
                        <span id="modalTo" class="modal-value"></span>
                    </div>
                    <div class="modal-period-row" id="modalTzRow">
                        <span class="modal-label">TZ:</span>
                        <span id="modalTz" class="modal-value"></span>
                    </div>
                </div>
                <!-- ドライラン結果 -->
                <div class="dryrun-result" id="dryrunResult" style="display:none;">
                    <div class="dryrun-header" id="dryrunHeader"></div>
                    <div class="dryrun-params" id="dryrunParams"></div>
                </div>
                <details style="margin-top:8px;">
                    <summary style="font-size:0.8rem;color:var(--text-muted);cursor:pointer;">変数の詳細を表示</summary>
                    <div class="modal-vars-grid" id="modalVarsGrid" style="margin-top:8px;"></div>
                </details>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
                <button class="btn btn-ghost" id="dryrunBtn" onclick="runDryRun()" style="display:none;">&#128269; テスト実行</button>
                <button class="btn btn-primary" onclick="confirmExecution()">&#9654; 実行</button>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let lastHistoryCount = 0;
        let pendingExecution = null;
        let tzMode = 'jst';
        let executionStartTime = null;
        let elapsedInterval = null;
        let eventSource = null;

        // ---- トースト ----
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const icons = { info: '\u2139\uFE0F', success: '\u2705', error: '\u274C', warning: '\u26A0\uFE0F' };
            const colors = { info: 'var(--accent)', success: 'var(--success)', error: 'var(--error)', warning: 'var(--warning)' };
            toast.style.cssText = `background:var(--bg-card);border:1px solid ${colors[type] || colors.info};border-radius:8px;padding:12px 20px;color:var(--text-primary);font-size:0.85rem;box-shadow:0 4px 16px rgba(0,0,0,0.3);animation:slideDown 0.3s ease;max-width:360px;display:flex;gap:8px;align-items:center;`;
            toast.innerHTML = `<span>${icons[type] || ''}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        // ---- SSE リアルタイム接続 ----
        function connectSSE() {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/api/events');
            const indicator = document.getElementById('sseIndicator');

            eventSource.onopen = () => {
                indicator.classList.add('connected');
                indicator.title = 'リアルタイム接続中';
            };
            eventSource.onerror = () => {
                indicator.classList.remove('connected');
                indicator.title = '接続が切れています（自動再接続中）';
            };

            eventSource.addEventListener('status', (e) => {
                const data = JSON.parse(e.data);
                updateProgress(data.running, data.progress);
            });

            eventSource.addEventListener('progress', (e) => {
                const data = JSON.parse(e.data);
                updateProgress(data.running, { message: data.message, current: data.current, total: data.total });
            });

            eventSource.addEventListener('history', (e) => {
                const entry = JSON.parse(e.data);
                appendHistoryEntry(entry);
            });

            eventSource.addEventListener('execution_start', (e) => {
                const data = JSON.parse(e.data);
                executionStartTime = Date.now();
                startElapsedTimer();
                dismissCompletion();
            });

            eventSource.addEventListener('execution_complete', (e) => {
                const data = JSON.parse(e.data);
                stopElapsedTimer();
                showCompletionCard(data);
                fetchStats();
            });
        }

        // ---- 初期化 ----
        document.addEventListener('DOMContentLoaded', () => {
            setPreset('yesterday', document.querySelector('.date-quick-btn'));
            document.getElementById('weekYearInput').value = new Date().getFullYear();
            document.getElementById('weekNumInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') applyWeekInput();
            });
            fetchStatus();
            fetchStats();
            connectSSE();
            // フォールバック: SSEが切れた場合のポーリング
            setInterval(() => {
                if (!eventSource || eventSource.readyState === EventSource.CLOSED) {
                    fetchStatus();
                    connectSSE();
                }
            }, 5000);
            setInterval(fetchStats, 15000);
            document.getElementById('dtFrom').addEventListener('change', onPeriodChange);
            document.getElementById('dtTo').addEventListener('change', onPeriodChange);
        });

        // ---- 経過時間タイマー ----
        function startElapsedTimer() {
            stopElapsedTimer();
            const el = document.getElementById('elapsedTimer');
            elapsedInterval = setInterval(() => {
                if (!executionStartTime) return;
                const sec = Math.floor((Date.now() - executionStartTime) / 1000);
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                el.textContent = m > 0 ? `${m}分${s}秒` : `${s}秒`;
            }, 1000);
        }

        function stopElapsedTimer() {
            if (elapsedInterval) clearInterval(elapsedInterval);
            elapsedInterval = null;
            executionStartTime = null;
            document.getElementById('elapsedTimer').textContent = '';
        }

        // ---- 完了サマリーカード ----
        function showCompletionCard(data) {
            const card = document.getElementById('completionCard');
            const icon = document.getElementById('completionIcon');
            const title = document.getElementById('completionTitle');
            const body = document.getElementById('completionBody');
            const header = document.getElementById('completionHeader');

            if (data.success) {
                icon.textContent = '\u2705';
                title.textContent = `${data.action} - 完了`;
                header.className = 'completion-header success';
                let bodyHTML = '';
                if (data.elapsed) bodyHTML += `<span class="completion-detail">所要時間: ${data.elapsed}</span>`;
                if (data.message) bodyHTML += `<span class="completion-detail">${data.message}</span>`;
                if (data.detail) {
                    bodyHTML += `<span class="completion-detail">成功: ${data.detail.success} / 失敗: ${data.detail.failed} / スキップ: ${data.detail.skipped}</span>`;
                }
                body.innerHTML = bodyHTML || '<span class="completion-detail">正常に完了しました</span>';
            } else {
                icon.textContent = '\u274C';
                title.textContent = `${data.action} - 失敗`;
                header.className = 'completion-header error';
                const errorMsg = data.error || '不明なエラーが発生しました';
                const guidance = getErrorGuidance(errorMsg);
                body.innerHTML = `
                    <div class="error-detail">
                        <span class="error-message">${errorMsg}</span>
                        ${guidance ? `<div class="error-guidance">
                            <span class="guidance-label">&#128161; 対処方法:</span>
                            <span class="guidance-text">${guidance}</span>
                        </div>` : ''}
                    </div>
                `;
            }
            card.style.display = 'block';
            showToast(data.success ? `${data.action} が完了しました` : `${data.action} が失敗しました`, data.success ? 'success' : 'error');
        }

        function dismissCompletion() {
            document.getElementById('completionCard').style.display = 'none';
        }

        function getErrorGuidance(error) {
            const lower = error.toLowerCase();
            if (lower.includes('timeout') || lower.includes('timed out'))
                return 'ネットワーク接続を確認してください。サーバーの応答が遅い場合は、タイムアウト値を大きくしてみてください。';
            if (lower.includes('connection') || lower.includes('接続'))
                return 'ネットワーク接続を確認してください。VPNやプロキシの設定も確認してみてください。';
            if (lower.includes('not found') || lower.includes('404') || lower.includes('見つかりません'))
                return 'URLやファイルパスが正しいか確認してください。設定エディタで設定内容を見直してみてください。';
            if (lower.includes('permission') || lower.includes('denied') || lower.includes('権限'))
                return 'ファイルやフォルダのアクセス権限を確認してください。';
            if (lower.includes('excel') || lower.includes('.xlsx'))
                return 'Excelファイルが他のアプリで開かれていないか確認してください。';
            if (lower.includes('selector') || lower.includes('element'))
                return 'Webページの構造が変わった可能性があります。CSSセレクタを確認してみてください。';
            return '';
        }

        // ---- 日付ヘルパー ----
        function toLocalISO(d) {
            const p = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
        }
        function getDtFrom() { return document.getElementById('dtFrom').value; }
        function getDtTo() { return document.getElementById('dtTo').value; }

        // ---- 週番号手動入力 ----
        function applyWeekInput() {
            const wn = parseInt(document.getElementById('weekNumInput').value);
            const yr = parseInt(document.getElementById('weekYearInput').value);
            if (!wn || wn < 1 || wn > 54) return;
            const jan1 = new Date(yr, 0, 1);
            const jan1dow = jan1.getDay();
            const sunday = new Date(jan1.getTime() - jan1dow * 86400000 + (wn - 1) * 7 * 86400000);
            const nextSunday = new Date(sunday.getTime() + 7 * 86400000);
            document.getElementById('dtFrom').value = toLocalISO(sunday);
            document.getElementById('dtTo').value = toLocalISO(nextSunday);
            document.querySelectorAll('.date-quick-btn').forEach(b => b.classList.remove('active'));
            onPeriodChange();
        }

        // ---- プリセット ----
        function setPreset(type, btn) {
            const now = new Date();
            const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let from, to;

            switch (type) {
                case 'yesterday':
                    from = new Date(today0.getTime() - 86400000);
                    to = new Date(today0.getTime());
                    break;
                case '2days':
                    from = new Date(today0.getTime() - 86400000 * 2);
                    to = new Date(today0.getTime() - 86400000);
                    break;
                case 'last_week': {
                    const dow = today0.getDay();
                    const sunThisWeek = new Date(today0.getTime() - dow * 86400000);
                    from = new Date(sunThisWeek.getTime() - 7 * 86400000);
                    to = sunThisWeek;
                    break;
                }
                case 'day_shift':
                    from = new Date(today0.getTime() + 7 * 3600000);
                    to = new Date(today0.getTime() + 19 * 3600000);
                    break;
                case 'night_shift':
                    from = new Date(today0.getTime() - 86400000 + 19 * 3600000);
                    to = new Date(today0.getTime() + 7 * 3600000);
                    break;
                case 'thismonth':
                    from = new Date(now.getFullYear(), now.getMonth(), 1);
                    to = new Date(today0.getTime());
                    break;
            }

            document.getElementById('dtFrom').value = toLocalISO(from);
            document.getElementById('dtTo').value = toLocalISO(to);

            document.querySelectorAll('.date-quick-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            onPeriodChange();
        }

        function onPeriodChange() {
            updateTzConvertedBar();
            updateTemplateVarsPreview();
        }

        // ---- TZ トグル ----
        function toggleTzMode() {
            tzMode = tzMode === 'jst' ? 'utc' : 'jst';
            const slider = document.getElementById('tzSlider');
            const jst = document.getElementById('tzJst');
            const utc = document.getElementById('tzUtc');
            if (tzMode === 'utc') {
                slider.style.transform = 'translateX(100%)';
                jst.classList.remove('active');
                utc.classList.add('active');
            } else {
                slider.style.transform = 'translateX(0)';
                jst.classList.add('active');
                utc.classList.remove('active');
            }
            updateTzConvertedBar();
            updateTemplateVarsPreview();
        }

        function updateTzConvertedBar() {
            const from = getDtFrom();
            const to = getDtTo();
            if (!from || !to) return;
            const el = document.getElementById('tzConvertedBar');
            const fDate = new Date(from + ':00+09:00');
            const tDate = new Date(to + ':00+09:00');
            const fmt = d => `${d.getUTCMonth() + 1}/${d.getUTCDate()} ${String(d.getUTCHours()).padStart(2, '0')}:${String(d.getUTCMinutes()).padStart(2, '0')}`;

            el.innerHTML =
                `<span class="tz-conv-item"><span class="tz-conv-label">UTC:</span> ${fmt(fDate)} &rarr; ${fmt(tDate)}</span>` +
                `<span class="tz-conv-sep">|</span>` +
                `<span class="tz-conv-item"><span class="tz-conv-label">W:</span> ${getISOWeek(fDate)}</span>`;
        }

        function getISOWeek(d) {
            const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            tmp.setUTCDate(tmp.getUTCDate() + 4 - (tmp.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
            return Math.ceil((((tmp - yearStart) / 86400000) + 1) / 7);
        }

        async function updateTemplateVarsPreview() {
            try {
                const res = await fetch('/api/preview_vars', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dt_from: getDtFrom(), dt_to: getDtTo(), tz_mode: tzMode }),
                });
                const data = await res.json();
                renderTemplateVars(data.vars);
            } catch (e) { }
        }

        // ---- データ取得 ----
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                renderGroups(data.groups);
                updateProgress(data.running, data.progress);
                updateHistory(data.history);
                if (document.getElementById('templateVars').children.length === 0) {
                    renderTemplateVars(data.template_vars);
                }
            } catch (e) { }
        }

        function renderGroups(groups) {
            const c = document.getElementById('groupContainer');
            const guide = document.getElementById('welcomeGuide');

            if (!groups || groups.length === 0) {
                if (guide) guide.style.display = 'block';
                return;
            }

            // アクションが1つもない場合
            const totalActions = groups.reduce((sum, g) => sum + g.actions.length, 0);
            if (totalActions === 0) {
                if (guide) guide.style.display = 'block';
                return;
            }

            if (guide) guide.style.display = 'none';
            if (c.querySelectorAll('.group-card').length > 0) return;

            const html = groups.map(g => `
                <div class="group-card">
                    <div class="group-header" style="border-left: 4px solid ${g.color}">
                        <div class="group-title">
                            <span class="group-icon">${g.icon}</span>
                            <span>${g.name}</span>
                            <span class="action-count">${g.actions.length}件</span>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="showConfirm('group','${g.name}','${g.name}','jst')">&#9654; すべて実行</button>
                    </div>
                    <div class="action-list">
                        ${g.actions.map(a => `
                            <div class="action-row ${a.enabled ? '' : 'disabled'}">
                                <button class="action-btn ${a.enabled ? '' : 'disabled'}"
                                        onclick="${a.enabled ? `showConfirm('action','${a.id}','${a.name}','${a.timezone}')` : ''}"
                                        ${a.enabled ? '' : 'disabled'} title="${a.type}">
                                    <span class="action-icon">${a.icon}</span>
                                    <span class="action-name">${a.name}</span>
                                    ${a.timezone === 'utc' ? '<span class="tz-badge utc">UTC</span>' : ''}
                                    <span class="action-type">${a.type}</span>
                                </button>
                                <span class="action-last-result" id="lastResult_${a.id}"></span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            // ウェルカムガイドを残しつつ、その後にグループカードを追加
            const existingCards = c.querySelectorAll('.group-card');
            existingCards.forEach(el => el.remove());
            c.insertAdjacentHTML('beforeend', html);

            // 最終実行結果を取得して表示
            fetchLastResults();
        }

        async function fetchLastResults() {
            try {
                const res = await fetch('/api/execution-history?limit=200');
                const data = await res.json();
                const lastByAction = {};
                for (const r of data.history) {
                    lastByAction[r.action] = r;
                }
                document.querySelectorAll('[id^="lastResult_"]').forEach(el => {
                    const actionId = el.id.replace('lastResult_', '');
                    // actionIdからアクション名を逆引き（ボタンのtextContentから）
                    const btn = el.parentElement.querySelector('.action-btn');
                    if (!btn) return;
                    const actionName = btn.querySelector('.action-name')?.textContent?.trim();
                    if (!actionName || !lastByAction[actionName]) return;
                    const r = lastByAction[actionName];
                    const time = r.timestamp ? new Date(r.timestamp).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                    if (r.success) {
                        el.innerHTML = `<span class="last-success" title="最終成功: ${time}">\u2713 ${time}</span>`;
                    } else {
                        el.innerHTML = `<span class="last-error" title="最終失敗: ${time}">\u2717 ${time}</span>`;
                    }
                });
            } catch (e) { }
        }

        // ---- モーダル ----
        async function showConfirm(type, id, name, actionTz) {
            pendingExecution = { type, id, name, actionTz };
            document.getElementById('modalTitle').textContent =
                (type === 'group' ? 'グループ実行: ' : 'アクション実行: ') + name;

            document.getElementById('modalFrom').textContent = getDtFrom().replace('T', ' ') + ' JST';
            document.getElementById('modalTo').textContent = getDtTo().replace('T', ' ') + ' JST';

            const tzLabel = actionTz === 'utc'
                ? 'UTC（{from}/{to} = UTC基準で展開）'
                : 'JST（{from}/{to} = JST基準で展開）';
            document.getElementById('modalTz').textContent = tzLabel;
            document.getElementById('modalTz').className = 'modal-value' + (actionTz === 'utc' ? ' utc-accent' : '');

            // ドライランボタン表示（アクション実行時のみ）
            document.getElementById('dryrunBtn').style.display = type === 'action' ? 'inline-flex' : 'none';
            document.getElementById('dryrunResult').style.display = 'none';

            try {
                const tz = actionTz || tzMode;
                const res = await fetch('/api/preview_vars', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dt_from: getDtFrom(), dt_to: getDtTo(), tz_mode: tz }),
                });
                const data = await res.json();
                const v = data.vars;
                const keys = [
                    ['from', 'to'],
                    ['from_date', 'to_date'],
                    ['from_date_jp', 'to_date_jp'],
                    ['week', 'from_week'],
                    ['today', 'yesterday'],
                ];
                document.getElementById('modalVarsGrid').innerHTML = keys.map(([k1, k2]) =>
                    `<div class="var-row"><code>{${k1}}</code><span>${v[k1]}</span></div>` +
                    `<div class="var-row"><code>{${k2}}</code><span>${v[k2]}</span></div>`
                ).join('');
            } catch (e) { }

            document.getElementById('confirmModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('confirmModal').style.display = 'none';
            pendingExecution = null;
        }

        // ---- ドライラン ----
        async function runDryRun() {
            if (!pendingExecution || pendingExecution.type !== 'action') return;
            const btn = document.getElementById('dryrunBtn');
            btn.textContent = '検証中...';
            btn.disabled = true;

            try {
                const res = await fetch(`/api/dryrun/action/${pendingExecution.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dt_from: getDtFrom(), dt_to: getDtTo() }),
                });
                const data = await res.json();
                const resultEl = document.getElementById('dryrunResult');
                const headerEl = document.getElementById('dryrunHeader');
                const paramsEl = document.getElementById('dryrunParams');

                if (data.error) {
                    headerEl.innerHTML = `<span class="dryrun-status error">\u274C ${data.error}</span>`;
                    paramsEl.innerHTML = '';
                } else if (data.valid) {
                    headerEl.innerHTML = '<span class="dryrun-status success">\u2705 設定に問題はありません。このまま実行できます。</span>';
                    paramsEl.innerHTML = Object.entries(data.resolved_params || {}).map(([k, v]) =>
                        `<div class="var-row"><code>${k}</code><span>${typeof v === 'object' ? JSON.stringify(v) : v}</span></div>`
                    ).join('');
                } else {
                    headerEl.innerHTML = `<span class="dryrun-status error">\u26A0\uFE0F 設定に問題があります</span>`;
                    paramsEl.innerHTML = (data.validation_issues || []).map(issue =>
                        `<div class="dryrun-issue">\u2022 ${issue}</div>`
                    ).join('');
                }
                resultEl.style.display = 'block';
            } catch (e) {
                showToast('テスト実行に失敗しました', 'error');
            } finally {
                btn.innerHTML = '&#128269; テスト実行';
                btn.disabled = false;
            }
        }

        async function confirmExecution() {
            if (!pendingExecution) return;
            const { type, id } = pendingExecution;
            closeModal();

            const body = { dt_from: getDtFrom(), dt_to: getDtTo() };
            const url = type === 'group'
                ? `/api/run/group/${encodeURIComponent(id)}`
                : `/api/run/action/${id}`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (data.error) {
                    showToast(data.error, 'error');
                } else {
                    showToast('実行を開始しました', 'info');
                }
            } catch (e) { showToast('通信エラー: ' + e.message, 'error'); }
        }

        // ---- プログレス・履歴 ----
        function updateProgress(running, progress) {
            const panel = document.getElementById('progressPanel');
            const badge = document.getElementById('statusBadge');
            if (running) {
                panel.style.display = 'block';
                document.getElementById('progressTitle').textContent = running;
                document.getElementById('progressDetail').textContent = progress.message;
                badge.textContent = '実行中';
                badge.className = 'status-badge running';
                const bar = document.getElementById('progressBar');
                if (progress.total > 0) {
                    bar.style.width = Math.round((progress.current / progress.total) * 100) + '%';
                    bar.classList.remove('indeterminate');
                } else {
                    bar.classList.add('indeterminate');
                }
            } else {
                panel.style.display = 'none';
                badge.textContent = '待機中';
                badge.className = 'status-badge';
            }
        }

        function appendHistoryEntry(entry) {
            const list = document.getElementById('historyList');
            if (list.querySelector('.empty-state')) list.innerHTML = '';
            if (currentFilter !== 'all' && entry.level !== currentFilter) return;

            const levelIcons = { success: '\u2705', error: '\u274C', warning: '\u26A0\uFE0F', info: '\u2139\uFE0F' };
            const div = document.createElement('div');
            div.className = `history-item ${entry.level}`;
            div.innerHTML = `
                <span class="history-icon">${levelIcons[entry.level] || ''}</span>
                <span class="history-time">${entry.time}</span>
                <span class="history-msg">${entry.message}</span>
            `;
            list.insertBefore(div, list.firstChild);
            // 最大100件
            while (list.children.length > 100) list.removeChild(list.lastChild);
        }

        function updateHistory(history) {
            if (history.length === lastHistoryCount) return;
            lastHistoryCount = history.length;
            const list = document.getElementById('historyList');
            const filtered = currentFilter === 'all' ? history : history.filter(h => h.level === currentFilter);
            const levelIcons = { success: '\u2705', error: '\u274C', warning: '\u26A0\uFE0F', info: '\u2139\uFE0F' };
            if (filtered.length === 0) {
                list.innerHTML = '<p class="empty-state">まだ履歴はありません</p>';
                return;
            }
            list.innerHTML = [...filtered].reverse().map(h => `
                <div class="history-item ${h.level}">
                    <span class="history-icon">${levelIcons[h.level] || ''}</span>
                    <span class="history-time">${h.time}</span>
                    <span class="history-msg">${h.message}</span>
                </div>
            `).join('');
        }

        function renderTemplateVars(vars) {
            document.getElementById('templateVars').innerHTML = Object.entries(vars).map(([k, v]) =>
                `<span class="var-tag"><code>{${k}}</code> = ${v}</span>`
            ).join('');
        }

        async function stopExecution() { await fetch('/api/stop', { method: 'POST' }); }

        // ---- ログパネル ----
        function toggleLogPanel() {
            const panel = document.getElementById('logPanel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                fetchLogs();
            } else {
                panel.style.display = 'none';
            }
        }

        async function fetchLogs() {
            try {
                const level = document.getElementById('logLevel').value;
                const search = document.getElementById('logSearch').value;
                const params = new URLSearchParams({ lines: 100 });
                if (level) params.set('level', level);
                if (search) params.set('search', search);
                const res = await fetch('/api/logs?' + params);
                const data = await res.json();
                const list = document.getElementById('logList');
                if (!data.lines || data.lines.length === 0) {
                    list.innerHTML = '<p class="empty-state">ログがありません</p>';
                    return;
                }
                list.innerHTML = data.lines.map(line => {
                    let cls = '';
                    if (line.includes('[ERROR]')) cls = 'error';
                    else if (line.includes('[WARNING]')) cls = 'warning';
                    else if (line.includes('[SUCCESS]')) cls = 'success';
                    return `<div class="log-line ${cls}">${escapeHtml(line)}</div>`;
                }).join('');
                list.scrollTop = list.scrollHeight;
            } catch (e) { }
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        async function reloadConfig() {
            await fetch('/api/reload', { method: 'POST' });
            document.getElementById('groupContainer').querySelectorAll('.group-card').forEach(el => el.remove());
            const guide = document.getElementById('welcomeGuide');
            if (guide) guide.style.display = 'block';
            lastHistoryCount = 0;
            fetchStatus();
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('statTotal').textContent = data.total;
                document.getElementById('statSuccess').textContent = data.success;
                document.getElementById('statFailed').textContent = data.failed;
                document.getElementById('statRate').textContent = data.success_rate + '%';

                const recent = data.recent_7d;
                const el = document.getElementById('statsRecent');
                if (recent.total > 0) {
                    el.textContent = `直近7日: ${recent.total}件実行 / ${recent.success}件成功`;
                } else {
                    el.textContent = '直近7日: 実行なし';
                }

                // 日別棒グラフ
                renderDailyChart(data.daily);
            } catch (e) { }
        }

        function renderDailyChart(daily) {
            if (!daily) return;
            const el = document.getElementById('dailyChart');
            const entries = Object.entries(daily);
            const maxVal = Math.max(1, ...entries.map(([, v]) => v.success + v.failed));

            el.innerHTML = `
                <div class="chart-bars">
                    ${entries.map(([day, v]) => {
                        const total = v.success + v.failed;
                        const sPct = Math.round((v.success / maxVal) * 100);
                        const fPct = Math.round((v.failed / maxVal) * 100);
                        return `
                            <div class="chart-col" title="${day}: 成功${v.success} 失敗${v.failed}">
                                <div class="chart-bar-wrap">
                                    <div class="chart-bar success" style="height:${sPct}%"></div>
                                    <div class="chart-bar failed" style="height:${fPct}%"></div>
                                </div>
                                <span class="chart-label">${day}</span>
                                ${total > 0 ? `<span class="chart-count">${total}</span>` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            lastHistoryCount = 0;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchStatus();
        }
        // ---- キーボードショートカット ----
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>

</html>
