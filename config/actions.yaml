actions:
- id: sales_csv
  name: 売上レポート取得
  type: csv_download
  group: 午前業務
  icon: 📊
  display_order: 1
  params:
    url: https://internal-tool.example.co.jp/csv?from={from_date_jp}&to={to_date_jp}
    excel_path: C:/Reports/売上.xlsx
    target_sheet: Data
    macro_name: Module1.SendMailReport
- id: inventory_csv
  name: 在庫データ取得
  type: csv_download
  group: 午前業務
  icon: 📦
  display_order: 2
  params:
    url: https://internal-tool.example.co.jp/inventory?date={from_date}
    excel_path: C:/Reports/在庫.xlsx
    target_sheet: Raw
- id: dashboard_scrape
  name: ダッシュボードデータ取得
  type: scraper
  group: 午後業務
  icon: 🌐
  timezone: utc
  display_order: 3
  params:
    mode: browser_csv
    url: https://analytics.example.com/export?start={from}&end={to}
    table_index: 0
    cdp_url: http://localhost:9222
    wait_selector: table
    table_selector: table
    download_timeout: 60
- id: api_export
  name: API集計エクスポート
  type: shell_cmd
  group: 夕方業務
  icon: ⚡
  timezone: utc
  display_order: 4
  params:
    command: curl -o export.json "https://api.example.com/v2/data?from={from_epoch}&to={to_epoch}"
